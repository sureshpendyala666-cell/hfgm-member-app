<!DOCTYPE html>
<html>
<head>
<title>Test App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family:Arial;padding:20px">

<h2>HFGM Member Test</h2>

<input id="name" placeholder="Name"><br><br>
<input id="village" placeholder="Village"><br><br>
<input id="occupation" placeholder="Occupation"><br><br>
<input id="cell" placeholder="Cell No"><br><br>

<button onclick="saveMember()">Save Member</button>

<table border="1" width="100%" style="margin-top:20px">
<thead>
<tr>
<th>S.No</th><th>Name</th><th>Village</th><th>Occupation</th><th>Cell</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let count = 0;

function saveMember(){
  alert("Button working");

  count++;

  let name = document.getElementById("name").value;
  let village = document.getElementById("village").value;
  let occupation = document.getElementById("occupation").value;
  let cell = document.getElementById("cell").value;

  document.getElementById("table").innerHTML += `
    <tr>
      <td>${count}</td>
      <td>${name}</td>
      <td>${village}</td>
      <td>${occupation}</td>
      <td>${cell}</td>
    </tr>
  `;
}
</script>

</body>
</html>
