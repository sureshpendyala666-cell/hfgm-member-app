<!DOCTYPE html>
<html>
<head>
<title>HFGM Member App</title>
</head>

<body>

<h2>Add Member</h2>

<input id="name" placeholder="Name"><br><br>
<input id="village" placeholder="Village"><br><br>
<input id="occupation" placeholder="Occupation"><br><br>
<input id="cell" placeholder="Mobile"><br><br>

<button onclick="saveData()">Save</button>

<script>
function saveData() {

  var name = document.getElementById("name").value;
  var village = document.getElementById("village").value;
  var occupation = document.getElementById("occupation").value;
  var cell = document.getElementById("cell").value;

  fetch("PASTE_YOUR_SCRIPT_URL_HERE", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      village: village,
      occupation: occupation,
      cell: cell
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Saved Successfully ✅");
  })
  .catch(err => {
    alert("Error ❌");
  });
}
</script>

</body>
</html>
