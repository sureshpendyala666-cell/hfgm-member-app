<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFGM Ministry App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#06151c,#0b4da2,#0aa6a6);
padding:15px;
min-height:100vh;
}

.app{
max-width:1200px;
margin:auto;
}

.topmenu{
display:flex;
gap:10px;
background:white;
padding:12px;
border-radius:15px;
margin-bottom:15px;
overflow:auto;
}

.topmenu a{
text-decoration:none;
background:#0b4da2;
color:white;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
white-space:nowrap;
}

.hero{
background:rgba(255,255,255,.15);
padding:25px;
border-radius:25px;
text-align:center;
color:white;
margin-bottom:20px;
}

.hero h1{
font-size:32px;
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:350px 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.card h2{
margin-bottom:15px;
color:#0b4da2;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.primary{
background:#0b4da2;
color:white;
width:100%;
margin-top:15px;
}

.green{
background:#0b8f68;
color:white;
}

.red{
background:#d93025;
color:white;
}

.tools{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tools input{
margin-top:0;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:15px;
}

.stat{
background:#f2f7ff;
padding:15px;
border-radius:15px;
text-align:center;
}

.stat b{
display:block;
font-size:22px;
color:#0b4da2;
}

.table-wrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#0b4da2;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.whatsapp{
background:#25D366;
color:white;
padding:8px 10px;
border-radius:10px;
text-decoration:none;
}

.actions{
display:flex;
gap:5px;
justify-content:center;
}

.mini{
padding:8px 10px;
font-size:12px;
}

.footer{
text-align:center;
color:white;
margin-top:20px;
}

@media(max-width:850px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="app">

<div class="topmenu">

<a href="#">Dashboard</a>
<a href="#">Members</a>
<a href="#">Attendance</a>
<a href="#">Donations</a>
<a href="#">Reports</a>

</div>

<div class="hero">

<div style="font-size:60px;">🕊️</div>

<h1>HFGM Ministry App</h1>

<p>Holy Spirit Fellowship Global Ministry</p>

</div>

<div class="grid">

<div class="card">

<h2>Add Member</h2>

<input id="name" placeholder="Enter Name">

<input id="village" placeholder="Enter Village">

<input id="occupation" placeholder="Enter Occupation">

<input id="cell" placeholder="Enter Cell Number">

<button class="primary" onclick="saveMember()">

Save Member

</button>

</div>

<div class="card">

<div class="stats">

<div class="stat">
<b id="totalCount">0</b>
Total Members
</div>

<div class="stat">
<b id="villageCount">0</b>
Villages
</div>

<div class="stat">
<b id="todayCount">0</b>
Today
</div>

</div>

<div class="tools">

<input id="search" placeholder="Search..." oninput="renderTable()">

<button class="green" onclick="downloadCSV()">
Excel
</button>

<button class="red" onclick="clearAll()">
Clear
</button>

</div>

<div class="table-wrap">

<table>

<thead>

<tr>

<th>S.No</th>
<th>Name</th>
<th>Village</th>
<th>Occupation</th>
<th>Cell</th>
<th>WhatsApp</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="memberTable"></tbody>

</table>

</div>

</div>

</div>

<div class="footer">

HFGM Ministry Management System

</div>

</div>

<script>

const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxlttLdb-YfhO7LPX5-eQl4mlY27ukO0ifr0hGYpPMqmAsfddZN_3BM8TvucgZrLhLxHw/exec";

let members = JSON.parse(localStorage.getItem("members") || "[]");

function saveStorage(){

localStorage.setItem("members", JSON.stringify(members));

}

function saveMember(){

const name = document.getElementById("name").value;
const village = document.getElementById("village").value;
const occupation = document.getElementById("occupation").value;
const cell = document.getElementById("cell").value;

if(!name || !village || !cell){

alert("Fill all details");

return;

}

const member = {

id:Date.now(),

name,
village,
occupation,
cell,

date:new Date().toISOString().slice(0,10)

};

members.push(member);

saveStorage();

renderTable();

sendToGoogleSheet(member);

document.getElementById("name").value="";
document.getElementById("village").value="";
document.getElementById("occupation").value="";
document.getElementById("cell").value="";

alert("Saved Successfully");

}

function sendToGoogleSheet(member){

const sno = members.length;

const url =
GOOGLE_SCRIPT_URL
+ "?sno=" + sno
+ "&name=" + encodeURIComponent(member.name)
+ "&village=" + encodeURIComponent(member.village)
+ "&occupation=" + encodeURIComponent(member.occupation)
+ "&cell=" + encodeURIComponent(member.cell);

fetch(url);

}

function renderTable(){

const tbody = document.getElementById("memberTable");

const q = document.getElementById("search").value.toLowerCase();

const filtered = members.filter(m =>

m.name.toLowerCase().includes(q) ||
m.village.toLowerCase().includes(q) ||
m.cell.includes(q)

);

document.getElementById("totalCount").innerText = members.length;

document.getElementById("villageCount").innerText =
new Set(members.map(m=>m.village)).size;

const today = new Date().toISOString().slice(0,10);

document.getElementById("todayCount").innerText =
members.filter(m=>m.date===today).length;

tbody.innerHTML = filtered.map((m,i)=>`

<tr>

<td>${i+1}</td>

<td>${m.name}</td>

<td>${m.village}</td>

<td>${m.occupation}</td>

<td>${m.cell}</td>

<td>

<a class="whatsapp"
href="https://wa.me/91${m.cell}"
target="_blank">

WhatsApp

</a>

</td>

<td>

<div class="actions">

<button class="mini green"
onclick="editMember(${m.id})">

Edit

</button>

<button class="mini red"
onclick="deleteMember(${m.id})">

Delete

</button>

</div>

</td>

</tr>

`).join("");

}

function deleteMember(id){

members = members.filter(m=>m.id!==id);

saveStorage();

renderTable();

}

function editMember(id){

const m = members.find(x=>x.id===id);

document.getElementById("name").value = m.name;
document.getElementById("village").value = m.village;
document.getElementById("occupation").value = m.occupation;
document.getElementById("cell").value = m.cell;

deleteMember(id);

}

function clearAll(){

if(confirm("Delete all members?")){

members=[];

saveStorage();

renderTable();

}

}

function downloadCSV(){

let csv =
"S.No,Name,Village,Occupation,Cell\n";

members.forEach((m,i)=>{

csv +=
${i+1},${m.name},${m.village},${m.occupation},${m.cell}\n;

});

const blob =
new Blob([csv], {type:"text/csv"});

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"HFGM_Members.csv";

a.click();

}

renderTable();

</script>

</body>
</html>
