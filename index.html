<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HFGM Firebase App</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#031b55,#006cb5,#09b5a5);padding:20px}
.app{max-width:1200px;margin:auto}
.hero,.card,.dash{background:white;border-radius:22px;padding:20px;margin:15px 0;box-shadow:0 8px 25px #0003}
.hero{background:#0b4da2;color:white;text-align:center}
.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.dash{text-align:center;font-weight:bold}.dash b{font-size:32px;color:#0b4da2}
.grid{display:grid;grid-template-columns:330px 1fr;gap:20px}
input,select,button{width:100%;padding:13px;margin:8px 0;border-radius:12px;border:1px solid #ccc}
button{background:#0b4da2;color:white;border:none;font-weight:bold;cursor:pointer}
.green{background:#087b5b}.red{background:#d93025}.wa{background:#25D366;color:white;padding:8px 12px;border-radius:10px;text-decoration:none;font-weight:bold}
.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:850px}
th{background:#0b4da2;color:white;padding:12px}td{padding:12px;border-bottom:1px solid #ddd;text-align:center}
.total{background:#eef5ff;padding:15px;border-radius:15px;text-align:center;font-size:22px;color:#0b4da2;font-weight:bold}
@media(max-width:850px){.grid,.dashboard{grid-template-columns:1fr}}
</style>
</head>

<body>
<div class="app">

<div class="hero">
<h1>🕊️ HFGM Ministry Pro App</h1>
<p>Holy Spirit Fellowship Global Ministry</p>
</div>

<div class="dashboard">
<div class="dash"><b id="dashMembers">0</b><br>👥 Members</div>
<div class="dash"><b id="dashVillages">0</b><br>🏘️ Villages</div>
<div class="dash"><b id="dashAttendance">0</b><br>🙏 Attendance</div>
<div class="dash"><b>₹<span id="dashDonations">0</span></b><br>💰 Donations</div>
</div>

<div class="grid">
<div class="card">
<h2>Add Member</h2>
<input id="name" placeholder="Name">
<input id="village" placeholder="Village">
<input id="occupation" placeholder="Occupation">
<input id="cell" placeholder="Cell Number">
<button onclick="saveMember()">Save Member</button>
</div>

<div class="card">
<h2>Members List</h2>
<input id="search" placeholder="Search member..." oninput="renderMembers()">
<div class="table-wrap">
<table>
<thead>
<tr><th>ID</th><th>Name</th><th>Village</th><th>Occupation</th><th>Cell</th><th>WhatsApp</th><th>ID Card</th><th>Delete</th></tr>
</thead>
<tbody id="memberTable"></tbody>
</table>
</div>
</div>
</div>

<div class="card">
<h2>Attendance</h2>
<input id="attName" placeholder="Member Name">
<input id="attDate" type="date">
<select id="attStatus"><option>Present</option><option>Absent</option></select>
<button onclick="saveAttendance()">Save Attendance</button>
<div class="table-wrap">
<table>
<thead><tr><th>S.No</th><th>Name</th><th>Date</th><th>Status</th><th>Delete</th></tr></thead>
<tbody id="attendanceTable"></tbody>
</table>
</div>
</div>

<div class="card">
<h2>Donations</h2>
<input id="donorName" placeholder="Donor Name">
<input id="donationAmount" type="number" placeholder="Amount">
<input id="donationPurpose" placeholder="Purpose">
<input id="donationDate" type="date">
<button onclick="saveDonation()">Save Donation</button>
<div class="total">Total Donations: ₹<span id="donationTotal">0</span></div>
<div class="table-wrap">
<table>
<thead><tr><th>S.No</th><th>Name</th><th>Amount</th><th>Purpose</th><th>Date</th><th>Delete</th></tr></thead>
<tbody id="donationTable"></tbody>
</table>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBLyi5hI-jSSyIf-H9rnpP_4Ldj6Cfpqu8",
authDomain: "hfgm-ministry.firebaseapp.com",
projectId: "hfgm-ministry",
storageBucket: "hfgm-ministry.firebasestorage.app",
messagingSenderId: "1079389581104",
appId: "1:1079389581104:web:3830dc23c81389cb7fe2f5",
measurementId: "G-2L8ZX8BJKM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let members=[], attendance=[], donations=[];

window.saveMember = async function(){
let name=nameEl.value.trim(), village=villageEl.value.trim(), occupation=occupationEl.value.trim(), cell=cellEl.value.trim();
if(!name||!village||!cell){alert("Name, Village, Cell fill cheyandi");return;}
await addDoc(collection(db,"members"),{name,village,occupation,cell});
nameEl.value=""; villageEl.value=""; occupationEl.value=""; cellEl.value="";
alert("Member Saved ✅");
renderMembers();
}

window.renderMembers = async function(){
let tb=memberTable, s=search.value.toLowerCase();
tb.innerHTML=""; members=[];
let snap=await getDocs(collection(db,"members"));
snap.forEach(d=>{
let m=d.data(); m.id=d.id; members.push(m);
if((m.name||"").toLowerCase().includes(s)||(m.village||"").toLowerCase().includes(s)||(m.occupation||"").toLowerCase().includes(s)||(m.cell||"").includes(s)){
tb.innerHTML+=`<tr>
<td>${d.id}</td><td>${m.name||""}</td><td>${m.village||""}</td><td>${m.occupation||""}</td><td>${m.cell||""}</td>
<td><a class="wa" target="_blank" href="https://wa.me/91${m.cell}">WhatsApp</a></td>
<td><button class="green" onclick="printID('${d.id}')">Print ID</button></td>
<td><button class="red" onclick="deleteMember('${d.id}')">Delete</button></td>
</tr>`;
}
});
updateDashboard();
}

window.deleteMember=async function(id){
if(confirm("Delete member?")){await deleteDoc(doc(db,"members",id));renderMembers();}
}

window.printID=function(id){
let m=members.find(x=>x.id===id);
let w=window.open("");
w.document.write(`<html><body style="font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh
