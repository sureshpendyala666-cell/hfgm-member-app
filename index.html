<script>
let count = 0;

function saveMember(){
  count++;

  let name = document.getElementById("name").value;
  let village = document.getElementById("village").value;
  let occupation = document.getElementById("occupation").value;
  let cell = document.getElementById("cell").value;

  // TABLE update
  document.getElementById("table").innerHTML += `
    <tr>
      <td>${count}</td>
      <td>${name}</td>
      <td>${village}</td>
      <td>${occupation}</td>
      <td>${cell}</td>
    </tr>
  `;

  // 🔥 GOOGLE SHEET SAVE
  fetch("https://script.google.com/macros/s/AKfycbxs44Zm4j3kK3jcsEKGQjUWGtsrt34Vun0Zcx9foU7G0OibLM5qviUg5b6Tdnuaitzo9g/exec", {
    method: "POST",
    body: new URLSearchParams({
      sno: count,
      name: name,
      village: village,
      occupation: occupation,
      cell: cell
    })
  });

  alert("Saved + Sent to Sheet ✅");
}
</script>
