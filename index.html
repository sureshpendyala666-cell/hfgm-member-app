<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFGM Member Pro App</title>

<style>
*{box-sizing:border-box;font-family:Arial;margin:0;padding:0}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#06172b,#0b4da2,#08a6a6);
  padding:15px;
}
.app{max-width:1100px;margin:auto}
.hero{
  background:rgba(255,255,255,.14);
  color:white;text-align:center;
  padding:28px;border-radius:28px;
  margin-bottom:18px;
}
.logo{font-size:55px}
h1{font-size:28px}
.grid{display:grid;grid-template-columns:360px 1fr;gap:18px}
.card{
  background:white;padding:18px;border-radius:22px;
  box-shadow:0 10px 30px #0004;
}
h2{color:#0b4da2;margin-bottom:15px}
label{font-weight:bold;font-size:14px;margin-top:12px;display:block}
input{
  width:100%;padding:14px;margin-top:6px;
  border-radius:14px;border:1px solid #ccc;font-size:16px;
}
button{
  padding:14px;border:0;border-radius:13px;
  font-size:16px;font-weight:bold;cursor:pointer;
}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.primary{background:#0b4da2;color:white}
.clear{background:#e8eef7;color:#0b4da2}
.green{background:#0b8f68;color:white}
.red{background:#d93025;color:white}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat{
  background:#f2f7ff;text-align:center;padding:13px;
  border-radius:15px;border:1px solid #dde9ff;
}
.stat b{font-size:24px;color:#0b4da2;display:block}
.tools{display:grid;grid-template-columns:1fr 150px 120px;gap:10px;margin-bottom:12px}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse;min-width:760px}
th{
  background:#0b4da2;color:white;padding:12px;font-size:14px;
}
td{padding:10px;border-bottom:1px solid #ddd;text-align:center}
.small{padding:8px 10px;font-size:12px}
.whatsapp{
  background:#25D366;color:white;padding:8px 10px;
  border-radius:10px;text-decoration:none;font-size:12px;font-weight:bold;
}
.footer{text-align:center;color:white;margin-top:18px;font-size:13px}

@media(max-width:850px){
  .grid{grid-template-columns:1fr}
  .tools{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="app">

  <div class="hero">
    <div class="logo">🕊️</div>
    <h1>HFGM Member Pro App</h1>
    <p>Holy Spirit Fellowship Global Ministry • Member Registration</p>
  </div>

  <div class="grid">

    <div class="card">
      <h2>Add New Member</h2>

      <input type="hidden" id="editId">

      <label>Name</label>
      <input id="name" placeholder="Enter full name">

      <label>Village</label>
      <input id="village" placeholder="Enter village name">

      <label>Occupation</label>
      <input id="occupation" placeholder="Enter occupation">

      <label>Cell No.</label>
      <input id="cell" placeholder="Enter mobile number">

      <div class="btns">
        <button class="primary" onclick="saveMember()">Save Member</button>
        <button class="clear" onclick="resetForm()">Clear</button>
      </div>
    </div>

    <div class="card">

      <div class="stats">
        <div class="stat"><b id="totalCount">0</b>Total</div>
        <div class="stat"><b id="villageCount">0</b>Villages</div>
        <div class="stat"><b id="todayCount">0</b>Today</div>
      </div>

      <div class="tools">
        <input id="search" placeholder="Search name, village, occupation, cell" oninput="renderTable()">
        <button class="green" onclick="downloadCSV()">Download Excel</button>
        <button class="red" onclick="clearAll()">Clear All</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>S.No</th>
              <th>Name</th>
              <th>Village</th>
              <th>Occupation</th>
              <th>Cell No.</th>
              <th>WhatsApp</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="memberTable"></tbody>
        </table>
      </div>

    </div>

  </div>

  <div class="footer">Data saves in this mobile/browser automatically.</div>

</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxs44Zm4j3kK3jcsEKGQjUWGtsrt34Vun0Zcx9foU7G0OibLM5qviUg5b6Tdnuaitzo9g/exec";
const STORAGE_KEY = "hfgm_members_pro_final";

let members = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

function saveLocal(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(members));
}

function saveMember(){
  let editId = document.getElementById("editId").value;
  let name = document.getElementById("name").value.trim();
  let village = document.getElementById("village").value.trim();
  let occupation = document.getElementById("occupation").value.trim();
  let cell = document.getElementById("cell").value.trim();

  if(name === ""){
    alert("Name enter cheyandi");
    return;
  }

  if(village === ""){
    alert("Village enter cheyandi");
    return;
  }

  if(cell === ""){
    alert("Cell No enter cheyandi");
    return;
  }

  let member = {
    id: editId || Date.now().toString(),
    name:name,
    village:village,
    occupation:occupation,
    cell:cell,
    date:new Date().toLocaleDateString()
  };

  if(editId){
    members = members.map(m => m.id === editId ? member : m);
    alert("Updated Successfully ✅");
  }else{
    members.push(member);
    alert("Saved Successfully ✅");
    sendToGoogleSheet(member, members.length);
  }

  saveLocal();
  resetForm();
  renderTable();
}

function sendToGoogleSheet(member, sno){
  let formData = new URLSearchParams();
  formData.append("sno", sno);
  formData.append("name", member.name);
  formData.append("village", member.village);
  formData.append("occupation", member.occupation);
  formData.append("cell", member.cell);

 fetch("https://script.google.com/macros/s/AKfycbxs44Zm4j3kK3jcsEKGQjUWGtsrt34Vun0Zcx9foU7G0OibLM5qviUg5b6Tdnuaitzo9g/exec", {

function resetForm(){
  document.getElementById("editId").value = "";
  document.getElementById("name").value = "";
  document.getElementById("village").value = "";
  document.getElementById("occupation").value = "";
  document.getElementById("cell").value = "";
}

function editMember(id){
  let m = members.find(x => x.id === id);
  if(!m) return;

  document.getElementById("editId").value = m.id;
  document.getElementById("name").value = m.name;
  document.getElementById("village").value = m.village;
  document.getElementById("occupation").value = m.occupation;
  document.getElementById("cell").value = m.cell;

  window.scrollTo({top:0,behavior:"smooth"});
}

function deleteMember(id){
  if(confirm("Delete this member?")){
    members = members.filter(m => m.id !== id);
    saveLocal();
    renderTable();
  }
}

function clearAll(){
  if(confirm("All data delete cheyala?")){
    members = [];
    saveLocal();
    renderTable();
  }
}

function renderTable(){
  let tbody = document.getElementById("memberTable");
  let search = document.getElementById("search").value.toLowerCase();

  let list = members.filter(m =>
    m.name.toLowerCase().includes(search) ||
    m.village.toLowerCase().includes(search) ||
    m.occupation.toLowerCase().includes(search) ||
    m.cell.toLowerCase().includes(search)
  );

  document.getElementById("totalCount").innerText = members.length;

  let villages = new Set(members.map(m => m.village.toLowerCase()));
  document.getElementById("villageCount").innerText = villages.size;

  let today = new Date().toLocaleDateString();
  document.getElementById("todayCount").innerText = members.filter(m => m.date === today).length;

  if(list.length === 0){
    tbody.innerHTML = <tr><td colspan="7">No members found</td></tr>;
    return;
  }

  tbody.innerHTML = list.map((m,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${m.name}</td>
      <td>${m.village}</td>
      <td>${m.occupation}</td>
      <td>${m.cell}</td>
      <td>
        <a class="whatsapp" target="_blank" href="https://wa.me/91${m.cell}">
          WhatsApp
        </a>
      </td>
      <td>
        <button class="primary small" onclick="editMember('${m.id}')">Edit</button>
        <button class="red small" onclick="deleteMember('${m.id}')">Delete</button>
      </td>
    </tr>
  `).join("");
}

function downloadCSV(){
  if(members.length === 0){
    alert("No data");
    return;
  }

  let csv = "S.No,Name,Village,Occupation,Cell No,Date\n";

  members.forEach((m,i)=>{
    csv += ${i+1},"${m.name}","${m.village}","${m.occupation}","${m.cell}","${m.date}"\n;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "HFGM_Members.csv";
  a.click();
}

renderTable();
</script>

</body>
</html>
