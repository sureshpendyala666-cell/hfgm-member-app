<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFGM Member App</title>
</head>

<body style="font-family:Arial;padding:20px">

<h2>HFGM Member App</h2>

<input id="name" placeholder="Name"><br><br>
<input id="village" placeholder="Village"><br><br>
<input id="occupation" placeholder="Occupation"><br><br>
<input id="cell" placeholder="Cell No"><br><br>

<button onclick="saveData()">Save</button>

<script>
function saveData() {
  var name = document.getElementById("name").value;
  var village = document.getElementById("village").value;
  var occupation = document.getElementById("occupation").value;
  var cell = document.getElementById("cell").value;

 fetch("https://script.google.com/macros/s/AKfycbxs44Zm4j3kK3jcsEKGQjUWGtsrt34Vun0Zcx9foU7G0OibLM5qviUg5b6Tdnuaitzo9g/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      village: village,
      occupation: occupation,
      cell: cell
    })
  })
  .then(function(response){
    alert("Saved Successfully ✅");
  })
  .catch(function(error){
    alert("Error ❌");
  });
}
</script>

</body>
</html>
