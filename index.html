<!DOCTYPE html>
<html>
<head>
<title>HFGM Ministry Pro App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#003b8e,#02a6a6);
padding:20px;
min-height:100vh;
}

.app{
max-width:1150px;
margin:auto;
}

.hero,.card{
background:white;
padding:20px;
border-radius:20px;
margin:15px;
}

.hero{
text-align:center;
background:#0b4da2;
color:white;
}

.grid{
display:grid;
grid-template-columns:350px 1fr;
gap:20px;
}

input,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#0b4da2;
color:white;
font-weight:bold;
cursor:pointer;
}

.delete{
background:#d93025;
}

.printbtn{
background:#0b8f68;
}

.whatsapp{
background:#25D366;
color:white;
padding:7px 10px;
border-radius:8px;
text-decoration:none;
font-size:13px;
}

.table-wrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
}

th{
background:#0b4da2;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.idcard{
width:320px;
padding:20px;
border-radius:20px;
background:#0b4da2;
color:white;
text-align:center;
margin:auto;
}

.idcard h2{
margin:10px 0;
}

.idcard p{
margin:8px 0;
font-size:18px;
}

@media(max-width:800px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="app">

<div class="hero">
<h1>🕊️ HFGM Ministry Pro App</h1>
<p>Holy Spirit Fellowship Global Ministry</p>
</div>

<div class="grid">

<div class="card">

<h2>Add Member</h2>

<input id="name" placeholder="Name">

<input id="village" placeholder="Village">

<input id="occupation" placeholder="Occupation">

<input id="cell" placeholder="Cell Number">

<button onclick="saveMember()">

Save Member

</button>

</div>

<div class="card">

<h2>Members List</h2>

<input id="search"
placeholder="Search..."
oninput="renderTable()">

<div class="table-wrap">

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Village</th>
<th>Occupation</th>
<th>Cell</th>
<th>WhatsApp</th>
<th>ID Card</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="memberTable"></tbody>

</table>

</div>

</div>

</div>

</div>

<script>

const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxlttLdb-YfhO7LPX5-eQl4mlY27ukO0ifr0hGYpPMqmAsfddZN_3BM8TvucgZrLhLxHw/exec";

let members =
JSON.parse(localStorage.getItem("hfgm_members") || "[]");

function saveMember(){

const name =
document.getElementById("name").value.trim();

const village =
document.getElementById("village").value.trim();

const occupation =
document.getElementById("occupation").value.trim();

const cell =
document.getElementById("cell").value.trim();

if(!name || !village || !cell){

alert("Please fill all details");

return;

}

const member = {

id:"HFGM" + (members.length + 1),

name,
village,
occupation,
cell

};

members.push(member);

localStorage.setItem(
"hfgm_members",
JSON.stringify(members)
);

renderTable();

sendToGoogleSheet(member);

document.getElementById("name").value="";
document.getElementById("village").value="";
document.getElementById("occupation").value="";
document.getElementById("cell").value="";

alert("Member Saved ✅");

}

function sendToGoogleSheet(member){

const url =
GOOGLE_SCRIPT_URL
+ "?name=" + encodeURIComponent(member.name)
+ "&village=" + encodeURIComponent(member.village)
+ "&occupation=" + encodeURIComponent(member.occupation || "")
+ "&cell=" + encodeURIComponent(member.cell);

const img = new Image();

img.src = url;

}

function renderTable(){

const tbody =
document.getElementById("memberTable");

const search =
document.getElementById("search").value.toLowerCase();

const filtered =
members.filter(m =>

m.name.toLowerCase().includes(search) ||
m.village.toLowerCase().includes(search) ||
m.cell.includes(search)

);

tbody.innerHTML="";

filtered.forEach((m,i)=>{

tbody.innerHTML += `

<tr>

<td>${m.id}</td>

<td>${m.name}</td>

<td>${m.village}</td>

<td>${m.occupation}</td>

<td>${m.cell}</td>

<td>

<a class="whatsapp"
target="_blank"
href="https://wa.me/91${m.cell}">

WhatsApp

</a>

</td>

<td>

<button class="printbtn"
onclick="printIDCard('${m.id}','${m.name}','${m.village}','${m.cell}')">

Print ID

</button>

</td>

<td>

<button class="delete"
onclick="deleteMember(${members.indexOf(m)})">

Delete

</button>

</td>

</tr>

`;

});

}

function deleteMember(index){

if(confirm("Delete this member?")){

members.splice(index,1);

localStorage.setItem(
"hfgm_members",
JSON.stringify(members)
);

renderTable();

}

}

function printIDCard(id,name,village,cell){

const card = `

<div class="idcard">

<h1>🕊️ HFGM</h1>

<h2>MEMBER ID CARD</h2>

<p><b>ID:</b> ${id}</p>

<p><b>Name:</b> ${name}</p>

<p><b>Village:</b> ${village}</p>

<p><b>Cell:</b> ${cell}</p>

<p>Holy Spirit Fellowship Global Ministry</p>

</div>

`;

const win = window.open("");

win.document.write(`

<html>

<head>

<title>ID Card</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#eee;
}

.idcard{
width:320px;
padding:20px;
border-radius:20px;
background:#0b4da2;
color:white;
text-align:center;
}

.idcard p{
font-size:18px;
margin:10px 0;
}

</style>

</head>

<body>

${card}

<script>
window.print();
<\/script>

</body>

</html>

`);

win.document.close();

}

renderTable();

</script>

</body>
</html>
