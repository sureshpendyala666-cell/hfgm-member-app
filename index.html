<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HFGM Member Pro App</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
    body{
      min-height:100vh;
      background:linear-gradient(135deg,#071726,#0b4da2,#09a7a7);
      color:#102033;
      padding:16px;
    }
    .app{max-width:1100px;margin:auto}
    .hero{
      color:white;
      padding:26px 18px;
      text-align:center;
      border-radius:28px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.22);
      box-shadow:0 18px 50px rgba(0,0,0,.25);
      backdrop-filter:blur(12px);
      margin-bottom:18px;
    }
    .logo{font-size:54px;line-height:1;margin-bottom:8px}
    h1{font-size:28px;margin-bottom:8px}
    .sub{opacity:.92;font-size:15px}
    .grid{display:grid;grid-template-columns:380px 1fr;gap:18px;align-items:start}
    .card{
      background:#fff;
      border-radius:24px;
      padding:18px;
      box-shadow:0 16px 40px rgba(0,0,0,.18);
    }
    .card h2{font-size:20px;color:#0b4da2;margin-bottom:14px}
    label{display:block;font-weight:bold;font-size:13px;margin:12px 0 6px;color:#334}
    input{
      width:100%;padding:13px 14px;border-radius:14px;border:1px solid #ccd4df;
      outline:none;font-size:15px;background:#f8fafc;
    }
    input:focus{border-color:#0b8aef;box-shadow:0 0 0 3px rgba(11,138,239,.12);background:#fff}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
    button{
      border:0;border-radius:14px;padding:13px;font-weight:bold;font-size:15px;cursor:pointer;
    }
    .primary{background:#0b4da2;color:white}
    .clear{background:#e8eef7;color:#0b4da2}
    .green{background:#0b8f68;color:white}
    .red{background:#d93025;color:white}
    .tools{display:grid;grid-template-columns:1fr 150px 130px;gap:10px;margin-bottom:14px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
    .stat{background:#f2f7ff;border-radius:16px;padding:12px;text-align:center;border:1px solid #dde9ff}
    .stat b{font-size:22px;color:#0b4da2;display:block}
    .table-wrap{overflow:auto;border-radius:16px;border:1px solid #e0e6ee}
    table{width:100%;border-collapse:collapse;min-width:760px;background:white}
    th{background:#0b4da2;color:white;text-align:left;padding:12px;font-size:13px;white-space:nowrap}
    td{padding:11px;border-bottom:1px solid #edf1f6;font-size:14px;vertical-align:middle}
    tr:hover{background:#f8fbff}
    .actions{display:flex;gap:6px}
    .mini{padding:8px 10px;border-radius:10px;font-size:12px;white-space:nowrap}
    .whatsapp{background:#25D366;color:white;text-decoration:none;padding:8px 10px;border-radius:10px;font-size:12px;font-weight:bold;display:inline-block}
    .empty{text-align:center;padding:28px;color:#667}
    .footer{text-align:center;color:white;opacity:.8;font-size:12px;margin-top:16px}
    @media(max-width:850px){
      body{padding:10px}
      .grid{grid-template-columns:1fr}
      .tools{grid-template-columns:1fr}
      .stats{grid-template-columns:1fr 1fr 1fr}
      h1{font-size:23px}
      .card{padding:14px;border-radius:20px}
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="logo">🕊️</div>
      <h1>HFGM Member Pro App</h1>
      <p class="sub">Holy Spirit Fellowship Global Ministry • Member Registration</p>
    </section><div class="grid">
  <section class="card">
    <h2 id="formTitle">Add New Member</h2>
    <input type="hidden" id="editId" />

    <label>Name</label>
    <input id="name" placeholder="Enter full name" />

    <label>Village</label>
    <input id="village" placeholder="Enter village name" />

    <label>Occupation</label>
    <input id="occupation" placeholder="Enter occupation" />

    <label>Cell No.</label>
    <input id="cell" inputmode="numeric" maxlength="10" placeholder="Enter 10 digit mobile number" />

    <div class="btns">
      <button class="primary" onclick="saveMember()">Save Member</button>
      <button class="clear" onclick="resetForm()">Clear</button>
    </div>
  </section>

  <section class="card">
    <div class="stats">
      <div class="stat"><b id="totalCount">0</b>Total</div>
      <div class="stat"><b id="villageCount">0</b>Villages</div>
      <div class="stat"><b id="todayCount">0</b>Today</div>
    </div>

    <div class="tools">
      <input id="search" placeholder="Search name, village, occupation, cell" oninput="renderTable()" />
      <button class="green" onclick="downloadCSV()">Download Excel</button>
      <button class="red" onclick="clearAll()">Clear All</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>S.No</th>
            <th>Name</th>
            <th>Village</th>
            <th>Occupation</th>
            <th>Cell No.</th>
            <th>WhatsApp</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="memberTable"></tbody>
      </table>
    </div>
  </section>
</div>

<div class="footer">Data saves in this mobile/browser automatically.</div>

  </div><script>
  const STORAGE_KEY = "hfgm_members_pro";
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxs44Zm4j3kK3jcsEKGQjUWGtsrt34Vun0Zcx9foU7G0OibLM5qviUg5b6Tdnuaitzo9g/exec";
  let members = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

  function saveToStorage(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(members));
  }

  function onlyDigits(value){
    return value.replace(/\D/g, "").slice(0, 10);
  }

  document.getElementById("cell").addEventListener("input", function(){
    this.value = onlyDigits(this.value);
  });

  function saveMember(){
    const editId = document.getElementById("editId").value;
    const name = document.getElementById("name").value.trim();
    const village = document.getElementById("village").value.trim();
    const occupation = document.getElementById("occupation").value.trim();
    const cell = document.getElementById("cell").value.trim();

    if(!name){ alert("Please enter Name"); return; }
    if(!village){ alert("Please enter Village"); return; }
    if(cell.length !== 10){ alert("Please enter valid 10 digit Cell No."); return; }

    const member = {
      id: editId || Date.now().toString(),
      name, village, occupation, cell,
      createdDate: new Date().toISOString().slice(0,10)
    };

    if(editId){
      members = members.map(m => m.id === editId ? {...m, ...member, createdDate:m.createdDate || member.createdDate} : m);
      alert("Member updated successfully");
    } else {
      members.push(member);
      alert("Member saved successfully");
    }

    saveToStorage();
    sendToGoogleSheet(member);
    resetForm();
    renderTable();
  }

  function sendToGoogleSheet(member){
    fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        sno: members.length,
        name: member.name,
        village: member.village,
        occupation: member.occupation,
        cell: member.cell
      })
    }).catch(() => {
      alert("Saved in app, but Google Sheet sync failed. Please check internet.");
    });
  }

  function resetForm(){
    document.getElementById("editId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("village").value = "";
    document.getElementById("occupation").value = "";
    document.getElementById("cell").value = "";
    document.getElementById("formTitle").innerText = "Add New Member";
  }

  function editMember(id){
    const m = members.find(x => x.id === id);
    if(!m) return;
    document.getElementById("editId").value = m.id;
    document.getElementById("name").value = m.name;
    document.getElementById("village").value = m.village;
    document.getElementById("occupation").value = m.occupation;
    document.getElementById("cell").value = m.cell;
    document.getElementById("formTitle").innerText = "Edit Member";
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function deleteMember(id){
    if(!confirm("Delete this member?")) return;
    members = members.filter(m => m.id !== id);
    saveToStorage();
    renderTable();
  }

  function clearAll(){
    if(!members.length){ alert("No data available"); return; }
    if(!confirm("Delete all members permanently from this device?")) return;
    members = [];
    saveToStorage();
    renderTable();
  }

  function filteredMembers(){
    const q = document.getElementById("search").value.toLowerCase().trim();
    if(!q) return members;
    return members.filter(m =>
      m.name.toLowerCase().includes(q) ||
      m.village.toLowerCase().includes(q) ||
      (m.occupation || "").toLowerCase().includes(q) ||
      m.cell.includes(q)
    );
  }

  function renderStats(){
    document.getElementById("totalCount").innerText = members.length;
    const villages = new Set(members.map(m => m.village.toLowerCase()).filter(Boolean));
    document.getElementById("villageCount").innerText = villages.size;
    const today = new Date().toISOString().slice(0,10);
    document.getElementById("todayCount").innerText = members.filter(m => m.createdDate === today).length;
  }

  function renderTable(){
    const tbody = document.getElementById("memberTable");
    const list = filteredMembers();
    renderStats();

    if(!list.length){
      tbody.innerHTML = <tr><td colspan="7" class="empty">No members found</td></tr>;
      return;
    }

    tbody.innerHTML = list.map((m, index) => `
      <tr>
        <td>${index + 1}</td>
        <td><b>${escapeHtml(m.name)}</b></td>
        <td>${escapeHtml(m.village)}</td>
        <td>${escapeHtml(m.occupation || "-")}</td>
        <td>${escapeHtml(m.cell)}</td>
        <td><a class="whatsapp" target="_blank" href="https://wa.me/91${m.cell}?text=Praise%20the%20Lord%20${encodeURIComponent(m.name)}">WhatsApp</a></td>
        <td>
          <div class="actions">
            <button class="mini primary" onclick="editMember('${m.id}')">Edit</button>
            <button class="mini red" onclick="deleteMember('${m.id}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join("");
  }

  function escapeHtml(text){
    return String(text).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  }

  function downloadCSV(){
    if(!members.length){ alert("No data to download"); return; }
    let csv = "S.No,Name,Village,Occupation,Cell No,Date\n";
    members.forEach((m,i)=>{
      csv += ${i+1},"${m.name}","${m.village}","${m.occupation || ""}","${m.cell}","${m.createdDate || ""}"\n;
    });
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "HFGM_Members.csv";
    a.click();
  }

  renderTable();
</script></body>
</html>
