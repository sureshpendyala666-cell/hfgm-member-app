<!DOCTYPE html>
<html>
<head>
<title>HFGM App</title>
<style>
body{
font-family:Arial;
background:#0b4da2;
padding:20px;
color:white;
}
.box{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
color:black;
}
input,button{
width:100%;
padding:12px;
margin:10px 0;
}
button{
background:#0b4da2;
color:white;
border:none;
}
table{
width:100%;
background:white;
color:black;
margin-top:20px;
}
td,th{
padding:10px;
}
img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}
</style>
</head>

<body>

<div class="box">

<h2>HFGM Member App</h2>

<input id="name" placeholder="Name">
<input id="village" placeholder="Village">
<input id="cell" placeholder="Cell">
<input id="photo" type="file">

<button onclick="saveMember()">Save Member</button>

</div>

<table border="1">
<thead>
<tr>
<th>ID</th>
<th>Photo</th>
<th>Name</th>
<th>Village</th>
<th>Cell</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

let members = JSON.parse(localStorage.getItem("members") || "[]");

function saveMember(){

let name=document.getElementById("name").value;
let village=document.getElementById("village").value;
let cell=document.getElementById("cell").value;
let file=document.getElementById("photo").files[0];

if(!name || !village || !cell){
alert("Fill all fields");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let member={
id:"HFGM"+(members.length+1),
name:name,
village:village,
cell:cell,
photo:e.target.result
};

members.push(member);

localStorage.setItem("members",JSON.stringify(members));

render();

alert("Saved");

};

if(file){
reader.readAsDataURL(file);
}else{

let member={
id:"HFGM"+(members.length+1),
name:name,
village:village,
cell:cell,
photo:""
};

members.push(member);

localStorage.setItem("members",JSON.stringify(members));

render();

alert("Saved");

}

}

function render(){

let table=document.getElementById("table");

table.innerHTML="";

members.forEach(m=>{

table.innerHTML += `
<tr>
<td>${m.id}</td>
<td>${m.photo ? <img src="${m.photo}"> : ""}</td>
<td>${m.name}</td>
<td>${m.village}</td>
<td>${m.cell}</td>
</tr>
`;

});

}

render();

</script>

</body>
</html>
